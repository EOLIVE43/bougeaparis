name: Deploy to o2switch
# Declenchement : a chaque push sur main, ou manuel via "Run workflow".
# Skip si le push ne touche que de la doc (CLAUDE.md, README, .gitignore...).
on:
  push:
    branches:
      - main
    paths-ignore:
      - '**/*.md'
      - '.gitignore'
  workflow_dispatch:

# Eviter les deploys parallels qui se marchent dessus (state file FTP +
# connexion FTPS). 2 pushs rapides : le 2e attend la fin du 1er au lieu de
# creer une race condition. cancel-in-progress=false pour ne jamais couper
# un upload en cours (risque de fichiers corrompus).
concurrency:
  group: deploy-main
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy via FTP
    runs-on: ubuntu-latest
    # Garde-fou : si la connexion FTPS hang, on coupe a 15 min au lieu de
    # laisser tourner jusqu'a la limite GitHub de 6h (cas du freeze 2026-05-05
    # ou les runs apparaissaient "in progress" indefiniment).
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Minification CSS — generee a la volee, jamais commitee au repo.
      # Node deja present sur le runner (cache npx). Le helper asset() PHP
      # bascule .css -> .min.css cote serveur si le fichier existe (voir
      # core/bootstrap.php). Source unique de verite = .css source lisible.
      #
      # CSS minifies : bundle (global) + station + tarifs + line.
      # Gain attendu : ~25-30% sur le payload CSS au-dessus de la fold.
      - name: Minify CSS
        run: |
          set -e
          CSS_DIR="public_html/assets/css"
          for f in bundle station tarifs line; do
            SRC="$CSS_DIR/$f.css"
            OUT="$CSS_DIR/$f.min.css"
            if [ -f "$SRC" ]; then
              npx -y clean-css-cli@5 --compatibility "ie9" -o "$OUT" "$SRC"
              SRC_SIZE=$(wc -c < "$SRC")
              OUT_SIZE=$(wc -c < "$OUT")
              echo "  $f.css : $SRC_SIZE -> $OUT_SIZE octets ($((100 - OUT_SIZE*100/SRC_SIZE))% de gain)"
            else
              echo "  $f.css : absent, skip"
            fi
          done
          echo "Verifications :"
          ls -la "$CSS_DIR"/*.min.css

      # Deploiement 1 : public_html/ vers la racine FTP (inchange)
      - name: Deploy public_html to o2switch
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          port: 21
          local-dir: ./public_html/
          server-dir: ./
          exclude: |
            **/.git*
            **/.git*/**
            **/.DS_Store
            **/node_modules/**
            **/.github/**
            **/README.md
            **/config/secrets.php
            **/api/cache/**
            **/api/cache/*
          log-level: standard
          state-name: .ftp-deploy-sync-state.json

      # Deploiement 2 : content/ vers /home/loxo5141/content/ (au-dessus de public_html)
      - name: Deploy content to o2switch
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          port: 21
          local-dir: ./content/
          server-dir: ../content/
          exclude: |
            **/.git*
            **/.git*/**
            **/.DS_Store
            **/README.md
          log-level: standard
          state-name: .ftp-deploy-content-sync-state.json
