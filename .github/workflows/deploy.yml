name: Deploy to o2switch
# Declenchement : a chaque push sur main, ou manuel via "Run workflow".
# Skip si le push ne touche que de la doc (CLAUDE.md, README, .gitignore...).
on:
  push:
    branches:
      - main
    paths-ignore:
      - '**/*.md'
      - '.gitignore'
  workflow_dispatch:

# Eviter les deploys parallels qui se marchent dessus (state file FTP +
# connexion FTPS). 2 pushs rapides : le 2e attend la fin du 1er au lieu de
# creer une race condition. cancel-in-progress=false pour ne jamais couper
# un upload en cours (risque de fichiers corrompus).
concurrency:
  group: deploy-main
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy via FTP
    runs-on: ubuntu-latest
    # Garde-fou : si la connexion FTPS hang, on coupe a 15 min au lieu de
    # laisser tourner jusqu'a la limite GitHub de 6h (cas du freeze 2026-05-05
    # ou les runs apparaissaient "in progress" indefiniment).
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Minification CSS — generee a la volee, jamais commitee au repo.
      # Node deja present sur le runner (cache npx). Le helper asset() PHP
      # bascule .css -> .min.css cote serveur si le fichier existe (voir
      # core/bootstrap.php). Source unique de verite = .css source lisible.
      #
      # CSS minifies : bundle (global) + station + tarifs + line + home.
      # Gain attendu : ~25-30% sur le payload CSS au-dessus de la fold.
      - name: Minify CSS
        run: |
          set -e
          CSS_DIR="public_html/assets/css"
          for f in bundle station tarifs line home; do
            SRC="$CSS_DIR/$f.css"
            OUT="$CSS_DIR/$f.min.css"
            if [ -f "$SRC" ]; then
              npx -y clean-css-cli@5 --compatibility "ie9" -o "$OUT" "$SRC"
              SRC_SIZE=$(wc -c < "$SRC")
              OUT_SIZE=$(wc -c < "$OUT")
              echo "  $f.css : $SRC_SIZE -> $OUT_SIZE octets ($((100 - OUT_SIZE*100/SRC_SIZE))% de gain)"
            else
              echo "  $f.css : absent, skip"
            fi
          done
          echo "Verifications :"
          ls -la "$CSS_DIR"/*.min.css

      # Critical CSS above-the-fold : extrait via critical@7 sur 3 URLs pilotes
      # (homepage + template station + template tarifs). Inlines dans <style> par
      # Template::getCriticalCss() sur la prod. Permet le pattern preload+swap
      # async pour bundle/station/tarifs/home (cf. base.php, conditionnel a la
      # presence d'un fichier critical-X.css).
      #
      # Cible : reduire Speed Index mobile (baseline 4.0s sur Concorde).
      # Threshold : critical-X.css doit rester < 14 KB (taille premier TCP
      # packet) — au-dela on perd l'avantage du inline.
      - name: Setup PHP for critical extraction
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          extensions: json, mbstring

      - name: Extract critical CSS (homepage + template station + tarifs)
        run: |
          set -e
          # Demarre serveur PHP local servant le repo (avec .min.css generes
          # a l'etape precedente -> helper asset() sert les minifies)
          php -S 127.0.0.1:8765 -t public_html/ > /tmp/php-srv.log 2>&1 &
          SRV_PID=$!
          # Wait pour init du serveur
          sleep 2
          # Sanity check : les 3 URLs pilotes repondent 200 ?
          for path in "/" "/metro/station/concorde/" "/tarifs/"; do
            CODE=$(curl -s -o /dev/null -w '%{http_code}' "http://127.0.0.1:8765$path")
            if [ "$CODE" != "200" ]; then
              echo "::error::URL pilote $path repond $CODE (attendu 200)"
              cat /tmp/php-srv.log
              kill $SRV_PID 2>/dev/null || true
              exit 1
            fi
          done

          # Viewport mobile (412x915 = Pixel 5 portrait, cohérent Lighthouse mobile)
          for pair in "home:/:critical-home.css" "concorde:/metro/station/concorde/:critical-station.css" "tarifs:/tarifs/:critical-tarifs.css"; do
            LABEL="${pair%%:*}"
            REST="${pair#*:}"
            URL_PATH="${REST%%:*}"
            OUT="public_html/assets/css/${REST##*:}"
            echo ""
            echo "::group::Extract $LABEL ($URL_PATH)"
            npx -y critical@7 \
              "http://127.0.0.1:8765${URL_PATH}" \
              --base public_html/ \
              --width 412 --height 915 \
              > "$OUT" 2> /tmp/critical-$LABEL.log
            if [ ! -s "$OUT" ]; then
              echo "::error::Critical CSS vide pour $LABEL"
              cat /tmp/critical-$LABEL.log
              kill $SRV_PID 2>/dev/null || true
              exit 1
            fi
            SIZE=$(wc -c < "$OUT")
            echo "  $OUT : $SIZE octets"
            # Warning si > 14 KB (au-dela on perd l'avantage critical inline)
            if [ "$SIZE" -gt 14336 ]; then
              echo "::warning::$OUT depasse 14 KB ($SIZE octets) — premier TCP packet."
            fi
            echo "::endgroup::"
          done

          kill $SRV_PID 2>/dev/null || true
          echo ""
          echo "Verifications finales :"
          ls -la public_html/assets/css/critical-*.css

      # Deploiement 1 : public_html/ vers la racine FTP (inchange)
      - name: Deploy public_html to o2switch
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          port: 21
          local-dir: ./public_html/
          server-dir: ./
          exclude: |
            **/.git*
            **/.git*/**
            **/.DS_Store
            **/node_modules/**
            **/.github/**
            **/README.md
            **/config/secrets.php
            **/api/cache/**
            **/api/cache/*
          log-level: standard
          state-name: .ftp-deploy-sync-state.json

      # Deploiement 2 : content/ vers /home/loxo5141/content/ (au-dessus de public_html)
      - name: Deploy content to o2switch
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          port: 21
          local-dir: ./content/
          server-dir: ../content/
          exclude: |
            **/.git*
            **/.git*/**
            **/.DS_Store
            **/README.md
          log-level: standard
          state-name: .ftp-deploy-content-sync-state.json
